<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Dashboard</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- AG Grid -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <!-- Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="logo"><span style="color:var(--accent); font-weight: 900;">INDIAN</span>-STOCKS</div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search Stocks..." autocomplete="off">
            <div id="search-dropdown" class="dropdown-content"></div>
        </div>
        <div class="controls">
            <button id="refresh-btn">Refresh</button>
            <button id="theme-toggle">☀</button>
        </div>
    </header>

    <main class="main-content">
        <!-- Grid Container -->
        <div class="grid-wrapper">
            <div id="myGrid" class="ag-theme-alpine-dark"></div>
        </div>

        <!-- Slide Out Panel -->
        <div id="side-panel" class="side-panel">
            <div class="panel-header">
                <div>
                    <h2 id="panel-company">Company Name</h2>
                    <span id="panel-ticker" class="ticker">TICKER</span>
                </div>
                <button id="close-panel">✕</button>
            </div>
            
            <div class="panel-stats">
                <div class="stat-card">
                    <span class="label">Price</span>
                    <span id="panel-price" class="value">₹0.00</span>
                </div>
                <div class="stat-card">
                    <span class="label">Change</span>
                    <span id="panel-change" class="value">0.00%</span>
                </div>
                <div class="stat-card">
                    <span class="label">Recommendation</span>
                    <span id="panel-rec" class="value badge">BUY</span>
                </div>
                <div class="stat-card">
                    <span class="label">Confidence</span>
                    <span id="panel-conf" class="value">0%</span>
                </div>
            </div>

            <!-- Chart Container -->
            <div id="chart-container" class="chart-container"></div>

            <!-- Indicators Grid -->
            <div class="indicators-grid">
                <div class="indicator-group">
                    <h3>Trend & Momentum</h3>
                    <div class="indicator-row">
                        <span>RSI (14)</span>
                        <span id="panel-rsi">--</span>
                    </div>
                    <div class="indicator-row">
                        <span>MACD</span>
                        <span id="panel-macd">--</span>
                    </div>
                    <div class="indicator-row">
                        <span>PSAR</span>
                        <span id="panel-psar">--</span>
                    </div>
                </div>

                <div class="indicator-group">
                    <h3>Levels</h3>
                    <div class="indicator-row">
                        <span>Support</span>
                        <span id="panel-support">--</span>
                    </div>
                    <div class="indicator-row">
                        <span>Resistance</span>
                        <span id="panel-resistance">--</span>
                    </div>
                    <div class="indicator-row">
                        <span>Bollinger Bands</span>
                        <span id="panel-bollinger">--</span>
                    </div>
                </div>

                <div class="indicator-group">
                    <h3>Fibonacci Retracement</h3>
                    <div class="indicator-row"><span>0%</span><span id="panel-fib-0">--</span></div>
                    <div class="indicator-row"><span>23.6%</span><span id="panel-fib-23">--</span></div>
                    <div class="indicator-row"><span>38.2%</span><span id="panel-fib-38">--</span></div>
                    <div class="indicator-row"><span>50%</span><span id="panel-fib-50">--</span></div>
                    <div class="indicator-row"><span>61.8%</span><span id="panel-fib-61">--</span></div>
                    <div class="indicator-row"><span>100%</span><span id="panel-fib-100">--</span></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/theme.js"></script>
    <script src="js/grid.js"></script>
    <script src="js/panel.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
